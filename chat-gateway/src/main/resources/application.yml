server:
  port: 8082

spring:
  config:
    import: optional:nacos:chat-gateway.yml
  application:
    name: chat-gateway
  cloud:
    nacos:
      discovery:
        server-addr: 127.0.0.1:8848
        namespace: public
        username: nacos
        password: nacos
      config:
        server-addr: 127.0.0.1:8848
        namespace: public
        file-extension: yml
        username: nacos
        password: nacos
    gateway:
      routes:
        - id: chat-service
          uri: http://localhost:8081
          predicates:
            - Path=/api/**
          filters:
            - StripPrefix=1
    sentinel:
      transport:
        dashboard: 127.0.0.1:8858
      eager: true
