# 服务端口
server:
  port: 8081

spring:
  config:
    import: optional:nacos:chat-service.yml  # Nacos 配置导入
  application:
    name: chat-service  # 应用名称
  # MySQL 数据源
  datasource:
    url: jdbc:mysql://127.0.0.1:3306/chat_system?useUnicode=true&characterEncoding=UTF-8&serverTimezone=Asia/Shanghai
    username: root
    password: "123456"
    driver-class-name: com.mysql.cj.jdbc.Driver
  # Redis 缓存
  redis:
    host: 127.0.0.1
    port: 6379
    password:
    database: 0
    lettuce:
      pool:
        max-active: 8    # 最大活跃连接
        max-idle: 8      # 最大空闲连接
        min-idle: 0      # 最小空闲连接
  # 文件上传
  servlet:
    multipart:
      max-file-size: 10MB     # 单文件大小上限
      max-request-size: 10MB  # 请求大小上限
  cloud:
    # Nacos 服务发现
    nacos:
      discovery:
        server-addr: 127.0.0.1:8848
        namespace: public
        username: nacos
        password: nacos
      # Nacos 配置中心
      config:
        server-addr: 127.0.0.1:8848
        namespace: public
        file-extension: yml
        username: nacos
        password: nacos
    # Sentinel 流量控制
    sentinel:
      transport:
        dashboard: 127.0.0.1:8858
      eager: true

# MyBatis-Plus 配置
mybatis-plus:
  configuration:
    map-underscore-to-camel-case: true  # 驼峰映射
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl  # SQL 日志输出
  global-config:
    db-config:
      id-type: auto           # 主键自增
      logic-delete-field: deleted  # 逻辑删除字段
      logic-delete-value: 1   # 已删除值
      logic-not-delete-value: 0  # 未删除值

# DeepSeek AI 接口
deepseek:
  api:
    key: sk-21a258f3a16d428abac97a54a547755a
    url: https://api.deepseek.com/v1/chat/completions
    model: deepseek-chat
