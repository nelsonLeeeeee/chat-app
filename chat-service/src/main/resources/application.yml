server:
  port: 8081

spring:
  config:
    import: optional:nacos:chat-service.yml
  application:
    name: chat-service
  datasource:
    url: jdbc:mysql://127.0.0.1:3306/chat_system?useUnicode=true&characterEncoding=UTF-8&serverTimezone=Asia/Shanghai
    username: root
    password: "123456"
    driver-class-name: com.mysql.cj.jdbc.Driver
  redis:
    host: 127.0.0.1
    port: 6379
    password:
    database: 0
    lettuce:
      pool:
        max-active: 8
        max-idle: 8
        min-idle: 0
  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 10MB
  cloud:
    nacos:
      discovery:
        server-addr: 127.0.0.1:8848
        namespace: public
        username: nacos
        password: nacos
      config:
        server-addr: 127.0.0.1:8848
        namespace: public
        file-extension: yml
        username: nacos
        password: nacos
    sentinel:
      transport:
        dashboard: 127.0.0.1:8858
      eager: true

mybatis-plus:
  configuration:
    map-underscore-to-camel-case: true
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl
  global-config:
    db-config:
      id-type: auto
      logic-delete-field: deleted
      logic-delete-value: 1
      logic-not-delete-value: 0

deepseek:
  api:
    key: sk-21a258f3a16d428abac97a54a547755a
    url: https://api.deepseek.com/v1/chat/completions
    model: deepseek-chat
